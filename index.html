
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --correct: #52C77A; --error: #FF4757; }
#app {
  font-family: 'Nunito', sans-serif;
  padding: 1rem 0.5rem 2rem;
  max-width: 700px; margin: 0 auto;
  background: linear-gradient(160deg, #FFF9F0 0%, #F0F7FF 50%, #FFF0F7 100%);
  border-radius: 24px; position: relative; overflow: hidden;
}
#app::before {
  content: '⭐ 🌈 ✨ 🎯 ⭐ 🌟 🎈 ✨';
  position: absolute; top: 8px; left: 0; right: 0;
  text-align: center; font-size: 18px; letter-spacing: 6px; opacity: 0.3;
  pointer-events: none;
}
.title-area { text-align: center; padding: 2rem 1rem 1rem; }
.title-area h1 { font-size: 28px; font-weight: 900; color: #7C3AED; letter-spacing: 1px; }
.title-area p { font-size: 14px; color: #A78BFA; margin-top: 4px; font-weight: 700; }
.tab-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; padding: 0 1rem; }
.tab { padding: 8px 18px; font-size: 14px; font-weight: 800; border: 3px solid transparent; border-radius: 99px; background: white; color: #9CA3AF; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.tab:hover { transform: translateY(-2px); }
.tab.active.t0 { background: #FFD6E7; color: #BE185D; border-color: #F9A8D4; }
.tab.active.t1 { background: #DDD6FE; color: #5B21B6; border-color: #A78BFA; }
.tab.active.t2 { background: #C8F7E0; color: #065F46; border-color: #6EE7B7; }
.settings-card { background: white; border-radius: 20px; padding: 1.25rem 1.5rem; margin: 0 1rem 1.25rem; box-shadow: 0 4px 16px rgba(124,58,237,0.1); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.settings-card label { font-size: 14px; font-weight: 800; color: #6B7280; }
select { font-size: 14px; font-weight: 700; padding: 6px 12px; border: 3px solid #E9D5FF; border-radius: 12px; background: #FAF5FF; color: #5B21B6; font-family: 'Nunito', sans-serif; cursor: pointer; }
.start-btn { margin-left: auto; padding: 10px 22px; font-size: 15px; font-weight: 900; background: linear-gradient(135deg, #7C3AED, #A78BFA); color: white; border: none; border-radius: 14px; cursor: pointer; font-family: 'Nunito', sans-serif; box-shadow: 0 4px 12px rgba(124,58,237,0.4); transition: all 0.2s; }
.start-btn:hover { transform: translateY(-2px); }
.start-btn:active { transform: scale(0.97); }
.hidden { display: none; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0 1rem 1rem; }
.stat-card { border-radius: 16px; padding: 12px 14px; text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.06); }
.stat-card:nth-child(1) { background: #FFF3C4; }
.stat-card:nth-child(2) { background: #C8F7E0; }
.stat-card:nth-child(3) { background: #FFD6E7; }
.stat-card .lbl { font-size: 12px; font-weight: 800; color: #6B7280; }
.stat-card .val { font-size: 22px; font-weight: 900; color: #374151; }
.progress-bar-wrap { margin: 0 1rem 1rem; height: 12px; background: #E9D5FF; border-radius: 99px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #7C3AED, #EC4899); border-radius: 99px; transition: width 0.4s ease; }

/* Word card with hint */
.word-card {
  background: white; border-radius: 24px; margin: 0 1rem 1rem;
  box-shadow: 0 6px 24px rgba(124,58,237,0.12);
  border: 3px solid #E9D5FF; overflow: hidden; cursor: text;
}
.word-card-top {
  display: flex; align-items: stretch; gap: 0;
}
.hint-side {
  width: 120px; min-width: 120px;
  background: linear-gradient(160deg, #FAF5FF, #EDE9FE);
  border-right: 2px dashed #DDD6FE;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 1rem 0.75rem; gap: 6px;
}
.hint-side .zh { font-size: 18px; font-weight: 900; color: #5B21B6; text-align: center; line-height: 1.3; }
.hint-side svg { display: block; }
.typing-side { flex: 1; padding: 1.25rem 1.25rem 1rem; }
.row-label { font-size: 11px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.target-label { color: #A78BFA; }
.typed-label { color: #34D399; }
.target-text { font-size: 26px; font-weight: 800; line-height: 1.8; word-break: break-all; min-height: 48px; letter-spacing: 2px; }
.typed-row-inner { background: #FAF5FF; border-top: 2px dashed #E9D5FF; padding: 0.9rem 1.25rem 1rem; }
.typed-text { font-size: 26px; font-weight: 800; line-height: 1.8; word-break: break-all; min-height: 48px; letter-spacing: 2px; }
.ch { color: #D1D5DB; white-space: pre; }
.ch.correct { color: var(--correct); }
.ch.error { color: var(--error); text-decoration: underline wavy; }
.ch.current { background: #FDE68A; color: #92400E; border-radius: 6px; animation: pulse-cur 0.8s ease-in-out infinite alternate; }
@keyframes pulse-cur { from{background:#FDE68A}to{background:#FCD34D} }
.t-correct { color: var(--correct); font-weight: 900; }
.t-error { color: var(--error); font-weight: 900; text-decoration: underline wavy; }
.t-cursor { display: inline-block; width: 3px; height: 1em; background: #7C3AED; vertical-align: text-bottom; border-radius: 2px; margin-left: 2px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

/* Special key card (no hint side) */
.special-card {
  background: white; border-radius: 24px; margin: 0 1rem 1rem;
  box-shadow: 0 6px 24px rgba(124,58,237,0.12);
  border: 3px solid #E9D5FF; overflow: hidden; cursor: text;
}
.special-target { padding: 1.25rem 1.5rem 1rem; }
.key-badge { display: inline-flex; align-items: center; gap: 3px; background: #F3F4F6; border: 3px solid #D1D5DB; border-radius: 12px; padding: 4px 12px; font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif; color: #374151; vertical-align: middle; margin: 3px; }
.key-badge.correct { background: #C8F7E0; border-color: #6EE7B7; color: #065F46; }
.key-badge.error { background: #FFE4E6; border-color: #FCA5A5; color: #991B1B; }
.key-badge.current { background: #FDE68A; border-color: #FCD34D; color: #78350F; animation: pulse-cur 0.8s ease-in-out infinite alternate; }
.key-typed-row { padding: 0.9rem 1.5rem 1.1rem; background: #FAF5FF; border-top: 2px dashed #E9D5FF; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-height: 58px; }
.key-typed-badge { display: inline-flex; align-items: center; background: white; border: 3px solid #D1D5DB; border-radius: 10px; padding: 4px 12px; font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif; color: #374151; }
.key-typed-badge.ok { background: #C8F7E0; border-color: #6EE7B7; color: #065F46; }
.key-typed-badge.fail { background: #FFE4E6; border-color: #FCA5A5; color: #991B1B; }
.key-typed-empty { font-size: 13px; font-weight: 700; color: #C4B5FD; }

.hint-bar { margin: 0 1rem 1rem; background: #FEF3C7; border-radius: 14px; padding: 10px 16px; font-size: 14px; font-weight: 800; color: #78350F; border: 2px solid #FCD34D; }
.hint-bar span { color: #7C3AED; }
.ghost-wrap { position: absolute; opacity: 0; width: 1px; height: 1px; }
.btn-row { display: flex; gap: 10px; margin: 0 1rem; flex-wrap: wrap; }
.action-btn { padding: 10px 20px; font-size: 14px; font-weight: 900; border: 3px solid #E9D5FF; border-radius: 14px; background: white; color: #7C3AED; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
.action-btn:hover { background: #FAF5FF; transform: translateY(-2px); }
.result-panel-box { background: white; border-radius: 24px; margin: 0 1rem; box-shadow: 0 6px 24px rgba(124,58,237,0.15); padding: 2rem; text-align: center; border: 3px solid #E9D5FF; }
.result-star { font-size: 48px; display: block; margin-bottom: 8px; animation: pop 0.5s cubic-bezier(.175,.885,.32,1.275); }
@keyframes pop { from{transform:scale(0)}to{transform:scale(1)} }
.result-pct { font-size: 64px; font-weight: 900; color: #7C3AED; line-height: 1; }
.result-msg { font-size: 18px; font-weight: 800; color: #A78BFA; margin: 6px 0 1.5rem; }
.result-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
.result-grid .stat-card { border-radius: 14px; }
</style>

<div id="app">
  <div class="title-area">
    <h1>🌟 打字小英雄 🌟</h1>
    <p>練習打字，變成最厲害的小英雄！</p>
  </div>
  <div class="tab-row">
    <button class="tab t0 active" onclick="setMode('english')">🍎 英文單字</button>
    <button class="tab t1" onclick="setMode('special')">⌨️ 特殊按鍵</button>
    <button class="tab t2" onclick="setMode('mixed')">🎯 混合挑戰</button>
  </div>
  <div class="settings-card">
    <label>難度 🎈</label>
    <select id="difficulty">
      <option value="easy">⭐ 簡單</option>
      <option value="medium" selected>⭐⭐ 普通</option>
      <option value="hard">⭐⭐⭐ 挑戰</option>
    </select>
    <label style="margin-left:8px;">題數 🎯</label>
    <select id="total-q">
      <option value="5">5 題</option>
      <option value="10" selected>10 題</option>
      <option value="20">20 題</option>
    </select>
    <button class="start-btn" onclick="startSession()">開始 🚀</button>
  </div>

  <div id="practice-area" class="hidden">
    <div class="stats-row">
      <div class="stat-card"><div class="lbl">正確率 🎯</div><div class="val" id="accuracy">—</div></div>
      <div class="stat-card"><div class="lbl">進度 🏃</div><div class="val" id="q-progress">0/0</div></div>
      <div class="stat-card"><div class="lbl">錯誤 😅</div><div class="val" id="err-count">0</div></div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
    <div id="question-area"></div>
    <div class="hint-bar" id="hint-bar">👆 點擊題目區域開始打字！</div>
    <div class="ghost-wrap"><input id="ghost" style="position:absolute;opacity:0;width:1px;height:1px;" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/></div>
    <div class="btn-row">
      <button class="action-btn" onclick="skipQuestion()">跳過 ⏭️</button>
      <button class="action-btn" onclick="startSession()">重來 🔄</button>
    </div>
  </div>

  <div id="result-panel" class="hidden">
    <div class="result-panel-box">
      <span class="result-star" id="result-star">🏆</span>
      <div class="result-pct" id="final-acc">—</div>
      <div class="result-msg" id="result-msg">太棒了！</div>
      <div class="result-grid">
        <div class="stat-card"><div class="lbl">總題數</div><div class="val" id="r-total">—</div></div>
        <div class="stat-card"><div class="lbl">答對 ✅</div><div class="val" id="r-correct">—</div></div>
        <div class="stat-card"><div class="lbl">錯誤 ❌</div><div class="val" id="r-errors">—</div></div>
      </div>
      <button class="start-btn" onclick="startSession()" style="width:100%;font-size:16px;padding:14px;">再玩一次 🎉</button>
    </div>
  </div>
</div>

let mode='english', questions=[], qIndex=0, totalQ=10;
let correctCount=0, totalErrors=0;
let currentQ=null, keySeqIndex=0;
let englishTyped=[], keyTypedLog=[];
let sessionActive=false;

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['english','special','mixed'][i]===m));
}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function buildQuestions(){
  const diff=document.getElementById('difficulty').value;
  totalQ=parseInt(document.getElementById('total-q').value);
  const pool=[];
  if(mode==='english'||mode==='mixed')
    shuffle(ENGLISH[diff]).slice(0,mode==='mixed'?Math.ceil(totalQ/2):totalQ).forEach(o=>pool.push({type:'english',text:o.w,zh:o.zh}));
  if(mode==='special'||mode==='mixed'){
    const need=mode==='mixed'?Math.floor(totalQ/2):totalQ;
    shuffle(SPECIAL[diff]).slice(0,need).forEach(s=>pool.push({type:'special',...s}));
  }
  return shuffle(pool).slice(0,totalQ);
}

function startSession(){
  questions=buildQuestions();
  qIndex=0;correctCount=0;totalErrors=0;sessionActive=true;
  document.getElementById('practice-area').classList.remove('hidden');
  document.getElementById('result-panel').classList.add('hidden');
  loadQuestion();updateStats();
}

function getIcon(word){return ICONS[word]||ICONS.default;}

function loadQuestion(){
  if(qIndex>=questions.length){showResult();return;}
  currentQ=questions[qIndex];keySeqIndex=0;englishTyped=[];keyTypedLog=[];
  document.getElementById('ghost').value='';
  buildQuestionUI();
  setHint();focusInput();
  document.getElementById('progress-bar').style.width=(qIndex/questions.length*100)+'%';
  document.getElementById('q-progress').textContent=`${qIndex+1}/${questions.length}`;
}

function buildQuestionUI(){
  const area=document.getElementById('question-area');
  if(currentQ.type==='english'){
    area.innerHTML=`
      <div class="word-card" onclick="focusInput()">
        <div class="word-card-top">
          <div class="hint-side">
            ${getIcon(currentQ.text)}
            <div class="zh">${currentQ.zh}</div>
          </div>
          <div class="typing-side">
            <div class="row-label target-label">📖 目標</div>
            <div class="target-text" id="display"></div>
          </div>
        </div>
        <div class="typed-row-inner">
          <div class="row-label typed-label">✏️ 你輸入的</div>
          <div class="typed-text" id="typed-display"><span class="t-cursor"></span></div>
        </div>
      </div>`;
  } else {
    area.innerHTML=`
      <div class="special-card" onclick="focusInput()">
        <div class="special-target">
          <div class="row-label target-label">📖 目標</div>
          <div id="display" style="font-size:18px;line-height:2;"></div>
        </div>
        <div id="typed-section">
          <div class="key-typed-row">
            <div class="row-label" style="font-size:11px;font-weight:900;color:#34D399;letter-spacing:.1em;text-transform:uppercase;width:100%;margin-bottom:6px;">✏️ 你按的</div>
            <span class="key-typed-empty">等待你按下按鍵…</span>
          </div>
        </div>
      </div>`;
  }
  renderTarget();
}

function keyDN(k){const m={ArrowDown:'↓',ArrowUp:'↑',ArrowLeft:'←',ArrowRight:'→',Enter:'Enter',Delete:'Del',Tab:'Tab'};return m[k]||k;}

function renderTarget(){
  const d=document.getElementById('display');
  if(!d)return;
  if(currentQ.type==='english'){
    const t=currentQ.text;let html='';
    for(let i=0;i<t.length;i++){
      let c='ch';
      if(i<englishTyped.length)c+=englishTyped[i]===t[i]?' correct':' error';
      else if(i===englishTyped.length)c+=' current';
      html+=`<span class="${c}">${t[i]}</span>`;
    }
    d.innerHTML=html;
  } else {
    d.innerHTML=currentQ.keys.map((k,i)=>{
      let c='key-badge';
      if(i<keySeqIndex)c+=' correct';
      else if(i===keySeqIndex)c+=' current';
      const mods=k.mod?k.mod.split('+').join('<span style="opacity:.5;padding:0 2px">+</span>'):'';
      const plus=k.mod?'<span style="opacity:.4;padding:0 3px">+</span>':'';
      return `<span class="${c}">${mods}${plus}${keyDN(k.key)}</span>`;
    }).join('<span style="color:#C4B5FD;padding:0 6px;font-size:18px">→</span>');
  }
}

function renderTyped(){
  if(currentQ.type==='english'){
    const td=document.getElementById('typed-display');
    if(!td)return;
    const t=currentQ.text;let html='';
    for(let i=0;i<englishTyped.length;i++)
      html+=`<span class="${englishTyped[i]===t[i]?'t-correct':'t-error'}">${englishTyped[i]}</span>`;
    td.innerHTML=html+'<span class="t-cursor"></span>';
  } else {
    const sec=document.getElementById('typed-section');
    if(!sec)return;
    sec.innerHTML=`<div class="key-typed-row"><div class="row-label" style="font-size:11px;font-weight:900;color:#34D399;letter-spacing:.1em;text-transform:uppercase;width:100%;margin-bottom:6px;">✏️ 你按的</div>${keyTypedLog.length===0?'<span class="key-typed-empty">等待你按下按鍵…</span>':keyTypedLog.map(e=>`<span class="key-typed-badge ${e.ok?'ok':'fail'}">${e.display}</span>`).join('')}</div>`;
  }
}

function setHint(){
  const h=document.getElementById('hint-bar');
  if(currentQ.type==='english'){
    h.innerHTML=`👇 請輸入：<span>${currentQ.text}</span>（${currentQ.zh}）`;
  } else {
    const k=currentQ.keys[keySeqIndex];
    const combo=(k.mod?k.mod+'+':'')+keyDN(k.key);
    const step=currentQ.keys.length>1?` （第 ${keySeqIndex+1}/${currentQ.keys.length} 步）`:'';
    h.innerHTML=`⌨️ 請按：<span>${combo}</span>${step}`;
  }
}

function focusInput(){document.getElementById('ghost').focus();}
function updateStats(){
  document.getElementById('accuracy').textContent=qIndex===0?'—':Math.round(correctCount/qIndex*100)+'%';
  document.getElementById('err-count').textContent=totalErrors;
}
function markCorrect(){correctCount++;qIndex++;updateStats();document.getElementById('progress-bar').style.width=(qIndex/questions.length*100)+'%';setTimeout(loadQuestion,350);}
function markError(){totalErrors++;updateStats();}
function skipQuestion(){qIndex++;updateStats();loadQuestion();}

document.getElementById('ghost').addEventListener('keydown',function(e){
  if(!sessionActive||!currentQ)return;
  if(currentQ.type==='special'){
    e.preventDefault();
    const k=currentQ.keys[keySeqIndex];
    const nC=k.mod.includes('Ctrl'),nS=k.mod.includes('Shift'),nA=k.mod.includes('Alt');
    if(['Control','Shift','Alt','Meta'].includes(e.key))return;
    const km=e.key.toUpperCase()===k.key.toUpperCase()||e.key===k.key;
    const mm=(!nC||e.ctrlKey)&&(!nS||e.shiftKey)&&(!nA||e.altKey)&&(nC||!e.ctrlKey)&&(nS||!e.shiftKey)&&(nA||!e.altKey);
    const parts=[];
    if(e.ctrlKey)parts.push('Ctrl');if(e.shiftKey)parts.push('Shift');if(e.altKey)parts.push('Alt');
    parts.push(keyDN(e.key));
    keyTypedLog.push({display:parts.join('+'),ok:km&&mm});
    renderTyped();
    if(km&&mm){keySeqIndex++;if(keySeqIndex>=currentQ.keys.length){renderTarget();markCorrect();}else{renderTarget();setHint();}}
    else markError();
  } else {
    if(e.key==='Backspace'){e.preventDefault();if(englishTyped.length>0){englishTyped.pop();renderTarget();renderTyped();}return;}
    if(e.key.length===1){
      e.preventDefault();
      const idx=englishTyped.length;if(idx>=currentQ.text.length)return;
      englishTyped.push(e.key);
      if(e.key!==currentQ.text[idx])markError();
      renderTarget();renderTyped();
      if(englishTyped.length===currentQ.text.length)markCorrect();
    }
  }
});

function showResult(){
  sessionActive=false;
  document.getElementById('practice-area').classList.add('hidden');
  document.getElementById('result-panel').classList.remove('hidden');
  const pct=Math.round(correctCount/questions.length*100);
  document.getElementById('final-acc').textContent=pct+'%';
  document.getElementById('r-total').textContent=questions.length;
  document.getElementById('r-correct').textContent=correctCount;
  document.getElementById('r-errors').textContent=totalErrors;
  const tier=pct===100?'perfect':pct>=80?'great':pct>=60?'ok':'keep';
  const msgs=RESULT_MSGS[tier];
  document.getElementById('result-msg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('result-star').textContent=pct===100?'🏆':pct>=80?'🌟':pct>=60?'😊':'🌱';
}
</script>
